services:
  postgres:
    image: postgres:17
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: harbor
      POSTGRES_PASSWORD: harbor
      POSTGRES_DB: harbor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U harbor -d harbor']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
